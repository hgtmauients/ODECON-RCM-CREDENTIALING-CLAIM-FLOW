name: NoodleDoc CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.6.9

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .
        continue-on-error: true  # warn-only until formatting is established repo-wide

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Validate migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          # Stable AES-256 key (32 bytes base64) for CI test runs only.
          # Tests that touch encrypt_credential / decrypt_credential need this
          # since the encryption module fails fast when ENV != "development"
          # and CLAIMFLOW_ENCRYPTION_KEY is unset.
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: pytest --cov=. --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci || npm install

      - name: ESLint
        working-directory: webapp
        run: npm run lint
        continue-on-error: true  # warn-only until existing lints are resolved

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci || npm install

      - name: Run frontend tests
        working-directory: webapp
        run: npm run test -- --run

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci || npm install

      - name: Type check
        working-directory: webapp
        run: npx tsc --noEmit

      - name: Build
        working-directory: webapp
        run: npm run build
