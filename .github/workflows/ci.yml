name: NoodleDoc CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff==0.6.9

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --require-hashes --no-deps -r requirements.lock
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Validate migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          # Stable AES-256 key (32 bytes base64) for CI test runs only.
          # Tests that touch encrypt_credential / decrypt_credential need this
          # since the encryption module fails fast when ENV != "development"
          # and CLAIMFLOW_ENCRYPTION_KEY is unset.
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: pytest --cov=. --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  backend-security-suite:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --require-hashes --no-deps -r requirements.lock
          pip install pytest pytest-asyncio httpx

      - name: Run security regression suite
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          E2E_DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: pytest -m security -v -W error::RuntimeWarning

  backend-rls-assurance-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --require-hashes --no-deps -r requirements.lock
          pip install pytest pytest-asyncio httpx

      - name: Apply migrations for RLS snapshot
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: alembic upgrade head

      - name: RLS assurance gate (force/policy coverage)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
        run: python scripts/check_rls_assurance.py

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: ESLint
        working-directory: webapp
        run: npm run lint

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Run frontend tests
        working-directory: webapp
        run: npm run test:coverage

  frontend-coverage-all-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Run all-files coverage baseline (ratcheting stage)
        working-directory: webapp
        run: npm run test:coverage:all

  frontend-e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Playwright browser
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: webapp
        run: npm run e2e:smoke

      - name: Upload Playwright report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report
          if-no-files-found: ignore

  frontend-e2e-fullstack:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimflow
          POSTGRES_PASSWORD: claimflow
          POSTGRES_DB: claimflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --require-hashes --no-deps -r requirements.lock

      - name: Run migrations + seed e2e user
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
          AUTH_LOGIN_INCLUDE_TOKEN: "false"
        run: |
          alembic upgrade head
          python -m scripts.seed_ci_e2e_user --email ci.e2e.fullstack@noodledoc.com --password admin

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Playwright browser
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run full-stack Playwright flow (real backend)
        working-directory: webapp
        env:
          DATABASE_URL: postgresql+asyncpg://claimflow:claimflow@localhost:5432/claimflow_test
          JWT_SECRET: ci-test-secret-must-be-at-least-32-characters-long
          CLAIMFLOW_ENCRYPTION_KEY: aWRlbnRpY2FsLWtleS1mb3ItY2ktcnVucy1vbmx5LTEyMzQ=
          ENV: test
          AUTH_LOGIN_INCLUDE_TOKEN: "false"
          E2E_ADMIN_EMAIL: ci.e2e.fullstack@noodledoc.com
          E2E_ADMIN_PASSWORD: admin
        run: npm run e2e:fullstack

      - name: Upload full-stack Playwright report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-fullstack-report
          path: webapp/playwright-report
          if-no-files-found: ignore

  frontend-visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Install Playwright browser
        working-directory: webapp
        run: npx playwright install --with-deps chromium

      - name: Run visual regression suite
        working-directory: webapp
        run: npm run e2e:visual

      - name: Upload visual Playwright report (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: webapp/playwright-report
          if-no-files-found: ignore

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        working-directory: webapp
        run: npm ci

      - name: Type check
        working-directory: webapp
        run: npm run typecheck

      - name: Build
        working-directory: webapp
        run: npm run build

      - name: Bundle budget gate
        working-directory: webapp
        run: npm run check:bundle-budget

  next10-test-subset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend test dependencies
        working-directory: backend
        run: |
          pip install --require-hashes --no-deps -r requirements.lock
          pip install pytest pytest-asyncio httpx

      - name: Run backend next-10 subset
        working-directory: backend
        env:
          ENV: test
        run: pytest -v tests/test_provider_adapter.py tests/test_credentialing_service_integrations.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Run frontend next-10 subset
        working-directory: webapp
        run: npm run test -- --run src/auth/__tests__/AuthProvider.test.tsx

  dependency-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: |
          pip install --require-hashes --no-deps -r backend/requirements.lock
          pip install pip-audit

      - name: Python dependency audit
        working-directory: backend
        run: pip-audit -r requirements.lock

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Frontend dependency audit
        working-directory: webapp
        run: npm audit --audit-level=moderate
