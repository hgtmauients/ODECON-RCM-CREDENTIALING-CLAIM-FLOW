services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claimflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claimflow}
      POSTGRES_DB: claimflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Local development env file. Copy .env.example → .env and edit.
    # Never commit .env. The defaults below are *only* used when .env is missing.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://claimflow:${POSTGRES_PASSWORD:-claimflow}@postgres:5432/claimflow}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-for-local-only-min32characters-long}
      ENV: ${ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      EDI_STORAGE_PATH: ${EDI_STORAGE_PATH:-/data/edi}
      STATE_LICENSE_PROVIDER_URL: ${STATE_LICENSE_PROVIDER_URL:-http://provider-adapter:8010/license/verify}
      BACKGROUND_CHECK_PROVIDER_URL: ${BACKGROUND_CHECK_PROVIDER_URL:-http://provider-adapter:8010/background/check}
      ADAPTER_API_KEY: ${ADAPTER_API_KEY:-}
      ADAPTER_SHARED_SECRET: ${ADAPTER_SHARED_SECRET:-}
      ADAPTER_CLIENT_TIMEOUT_SECONDS: ${ADAPTER_CLIENT_TIMEOUT_SECONDS:-30}
      ADAPTER_CLIENT_MAX_RETRIES: ${ADAPTER_CLIENT_MAX_RETRIES:-2}
      ADAPTER_CLIENT_RETRY_BACKOFF_SECONDS: ${ADAPTER_CLIENT_RETRY_BACKOFF_SECONDS:-0.2}
      # API_CERT_KEY intentionally omitted; set in backend/.env if you want
      # to test the API-Cert integration locally.
    volumes:
      - ./backend:/app
      - edi_data:/data/edi
    depends_on:
      postgres:
        condition: service_healthy
      provider-adapter:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  provider-adapter:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      ADAPTER_HTTP_TIMEOUT_SECONDS: ${ADAPTER_HTTP_TIMEOUT_SECONDS:-10}
      LICENSE_UPSTREAM_URL: ${LICENSE_UPSTREAM_URL:-}
      BACKGROUND_UPSTREAM_URL: ${BACKGROUND_UPSTREAM_URL:-}
      ADAPTER_MAX_RETRIES: ${ADAPTER_MAX_RETRIES:-2}
      ADAPTER_RETRY_BACKOFF_SECONDS: ${ADAPTER_RETRY_BACKOFF_SECONDS:-0.2}
      ADAPTER_RATE_LIMIT_REQUESTS: ${ADAPTER_RATE_LIMIT_REQUESTS:-120}
      ADAPTER_RATE_LIMIT_WINDOW_SECONDS: ${ADAPTER_RATE_LIMIT_WINDOW_SECONDS:-60}
      ADAPTER_REQUIRE_AUTH: ${ADAPTER_REQUIRE_AUTH:-false}
      ADAPTER_AUTH_WINDOW_SECONDS: ${ADAPTER_AUTH_WINDOW_SECONDS:-300}
      ADAPTER_API_KEY: ${ADAPTER_API_KEY:-}
      ADAPTER_SHARED_SECRET: ${ADAPTER_SHARED_SECRET:-}
    volumes:
      - ./backend:/app
    command: uvicorn adapter.main:app --host 0.0.0.0 --port 8010 --reload

  frontend:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./webapp/src:/app/src
      - ./webapp/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  edi_data:
