services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: claimflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claimflow}
      POSTGRES_DB: claimflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Local development env file. Copy .env.example → .env and edit.
    # Never commit .env. The defaults below are *only* used when .env is missing.
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://claimflow:${POSTGRES_PASSWORD:-claimflow}@postgres:5432/claimflow}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-for-local-only-min32characters-long}
      ENV: ${ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      EDI_STORAGE_PATH: ${EDI_STORAGE_PATH:-/data/edi}
      # API_CERT_KEY intentionally omitted; set in backend/.env if you want
      # to test the API-Cert integration locally.
    volumes:
      - ./backend:/app
      - edi_data:/data/edi
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./webapp/src:/app/src
      - ./webapp/vite.config.ts:/app/vite.config.ts
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  edi_data:
