services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: noodledoc
      # Required - do not provide a default. docker compose will fail loudly
      # if POSTGRES_PASSWORD is not set in .env.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: noodledoc
      APP_DB_USER: ${APP_DB_USER:-claimflow_app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgbackups:/backups
      - ./backend/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noodledoc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-claimflow_app}:${APP_DB_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}}@postgres:5432/noodledoc
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      CLAIMFLOW_SCHEDULER_ENABLED: ${CLAIMFLOW_SCHEDULER_ENABLED:-true}
      STATE_LICENSE_PROVIDER_URL: ${STATE_LICENSE_PROVIDER_URL:-}
      BACKGROUND_CHECK_PROVIDER_URL: ${BACKGROUND_CHECK_PROVIDER_URL:-}
      ADAPTER_API_KEY: ${ADAPTER_API_KEY:-}
      ADAPTER_SHARED_SECRET: ${ADAPTER_SHARED_SECRET:-}
      ADAPTER_CLIENT_TIMEOUT_SECONDS: ${ADAPTER_CLIENT_TIMEOUT_SECONDS:-30}
      ADAPTER_CLIENT_MAX_RETRIES: ${ADAPTER_CLIENT_MAX_RETRIES:-2}
      ADAPTER_CLIENT_RETRY_BACKOFF_SECONDS: ${ADAPTER_CLIENT_RETRY_BACKOFF_SECONDS:-0.2}
    volumes:
      - edi_data:/data/edi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  # Daily pg_dump at 03:00 UTC. Keeps last 30 days. Backups land in the
  # pgbackups volume so they survive container removal/recreation.
  backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RETENTION_DAYS: "30"
      BACKUP_HOUR_UTC: "3"
    volumes:
      - pgbackups:/backups
      - ./backend/backup-runner.sh:/usr/local/bin/backup-runner.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-runner.sh"]
    restart: unless-stopped

volumes:
  pgdata:
  edi_data:
  redisdata:
  pgbackups:
